<!DOCTYPE html>
<html>
<head>
<title>AsTREA</title>
<style>
body {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  background-color: #fff; /* Initial background color */
}

.splash {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  animation: splash 2s ease-out forwards;
}

@keyframes splash {
  0% {
    width: 0;
    height: 0;
    opacity: 0;
  }
  50% {
    width: 200px;
    height: 200px;
    opacity: 0.5;
  }
  100% {
    width: 300px;
    height: 300px;
    opacity: 0;
  }
}

.splash:nth-child(1) {
  background-color: red;
  animation-delay: 0s;
}

.splash:nth-child(2) {
  background-color: blue;
  animation-delay: 0.5s;
}

.splash:nth-child(3) {
  background-color: green;
  animation-delay: 1s;
}

.splash:nth-child(4) {
  background-color: yellow;
  animation-delay: 1.5s;
}

/* Add more splashes with different colors and delays */
</style>
</head>
<body>
  <div class="splash"></div>
  <div class="splash"></div>
  <div class="splash"></div>
  <div class="splash"></div>
</body>
</html>
